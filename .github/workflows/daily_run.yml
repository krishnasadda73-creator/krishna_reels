name: Krishna Modular Bot
on:
  schedule:
    - cron: '0 3,9,15 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          # Dono libraries install kar rahe hain safety ke liye
          pip install google-genai google-generativeai google-api-python-client google-auth-oauthlib
          echo "${{ secrets.TOKEN_PICKLE }}" > token.pickle

      - name: 1. Brain (Analyze)
        env: { GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}" }
        run: python brain.py

      - name: 2. Editor (Render)
        run: python editor.py

      - name: 3. Uploader (YouTube)
        run: python uploader.py

      - name: 4. Move Image & Cleanup
        run: |
          if [ -f metadata.txt ]; then
            IMG=$(head -n 1 metadata.txt | tr -d '\r')
            mv "$IMG" Used/
            git config --global user.name "Bot"
            git config --global user.email "bot@github.com"
            git add Used/ Images/
            git commit -m "Auto: Content Processed" && git push || echo "No changes"
          else
            echo "No metadata.txt found, skipping cleanup."
          fi
