name: Krishna Reel Bot

on:
  schedule:
    # Din mein 3 baar: Subah 8:30, Dopahar 2:30, Raat 8:30 (IST approx)
    - cron: '0 3,9,15 * * *' 
  workflow_dispatch: # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    # Permission zaroori hai repo mein wapas write karne ke liye
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: pip install google-generativeai google-api-python-client google-auth-oauthlib

      - name: Restore Token Pickle
        run: echo "${{ secrets.TOKEN_PICKLE }}" > token.pickle

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: Cleanup & Commit Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          
          # Faltu files ko git ignore karega
          rm -f final_reel.mp4
          rm -f token.pickle
          
          # Sirf folders ko track karo
          git add Images/ Used/
          
          # Agar koi image move hui hai toh hi commit hoga
          if git diff --staged --quiet; then
            echo "No changes to commit. Maybe folder was already empty?"
          else
            git commit -m "Automated Content Update: Image moved to Used/"
            git push
          fi
